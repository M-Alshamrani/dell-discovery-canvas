<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow, noarchive" />
  <title>Dell Discovery Canvas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" type="image/svg+xml" href="/Logo/canvas-icon.svg" />
  <!-- v2.4.10 · PWA manifest · registers Canvas as a handler for the
       .canvas file type so saved files show our icon in the OS and can
       be opened via double-click after the user installs the app.
       Optional for the webapp experience; required for OS file
       association. -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#0078D4" />
</head>
<body>

  <header id="app-header">
    <div class="header-brand">
      <!-- v2.5.0 TB2: local Dell logo (offline-safe, no CDN dependency).
           Dell-blue logo on white topbar; the inverted-white treatment from
           the v2.2.x blue gradient era is gone. -->
      <img src="./Logo/delltech-logo-stk-blue-rgb.avif"
           alt="Dell Technologies" />
      <div>
        <div class="header-title">Discovery Canvas</div>
        <div class="header-sub">IT / Enterprise Architecture · Dell Technologies</div>
      </div>
    </div>
    <!-- v2.5.0 TB3: doc-meta strip in the center column. Mono caps,
         vertical 1px rules between fields. Philosophy three-column header. -->
    <div class="header-meta-strip" id="sessionMetaHeader">
      <span>No session loaded</span>
    </div>
    <div class="header-right">
      <div class="header-app-version" id="appVersionChip" title="Dell Discovery Canvas build version (separate from session schema version)">Canvas v.</div>
      <button id="undoBtn" class="undo-chip" type="button" aria-label="Undo last AI change" style="display:none;">
        ↶ Undo last AI change
        <span id="undoCountBadge" class="undo-count-badge" aria-hidden="true"></span>
      </button>
      <button id="undoAllBtn" class="undo-chip undo-chip-all" type="button" aria-label="Undo all tracked AI changes" style="display:none;">
        ↶↶ Undo all
      </button>
      <button id="settingsBtn" class="gear-btn" type="button" aria-label="Open AI settings">
        <svg width="18" height="18" viewBox="0 0 16 16" fill="none" stroke="currentColor"
             stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="8" cy="8" r="2"/>
          <path d="M8 1.2v1.6 M8 13.2v1.6 M14.8 8h-1.6 M2.8 8h-1.6 M12.8 3.2l-1.1 1.1 M4.3 11.7l-1.1 1.1 M12.8 12.8l-1.1-1.1 M4.3 4.3l-1.1-1.1"/>
        </svg>
      </button>
    </div>
  </header>

  <nav id="stepper"></nav>

  <div id="main">
    <div id="main-left"></div>
    <div id="main-right"></div>
  </div>

  <footer id="app-footer">
    <div class="footer-actions">
      <button id="exportBtn" class="btn-outline" title="Save your work as a .canvas file you can re-open later, back up, or share with a colleague.">↓ Save to file</button>
      <button id="openFileBtn" class="btn-outline" title="Load a previously saved .canvas file. Your work replaces whatever's currently on screen.">↑ Open file</button>
      <input id="openFileInput" type="file" accept=".canvas,application/vnd.delltech.canvas+json,application/json" style="display:none" />
      <button id="demoBtn"   class="btn-ghost">↺ Load demo</button>
      <button id="newSessionBtn" class="btn-ghost">+ New session</button>
      <button id="clearAllBtn" class="btn-ghost footer-btn-destructive" title="Wipe every dell_discovery_* and ai_* localStorage key and reload as a brand-new user.">Clear all data</button>
    </div>
    <div class="footer-hint">Auto-saved to browser · data stays on your device</div>
  </footer>

  <script type="module" src="app.js"></script>
</body>
</html>
